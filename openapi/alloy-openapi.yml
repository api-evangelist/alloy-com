openapi: 3.0.3
info:
  title: Alloy API
  description: |
    The Alloy API is the programmatic surface for Alloy's identity decisioning
    platform. It exposes the resources behind Alloy's KYC, KYB, AML, fraud,
    credit, and ongoing-monitoring workflows used by banks, credit unions, and
    fintechs.

    The API is organized around evaluations, journey applications, entities
    (persons and businesses), bank accounts, documents, events, cases,
    investigations, custom lists, published attributes, and webhooks. Sandbox
    and production environments are exposed as two distinct base URLs.
  version: '1.0'
  contact:
    name: Alloy Developer Support
    url: https://help.alloy.com
  license:
    name: Proprietary
    url: https://www.alloy.com/tos
servers:
  - url: https://sandbox.alloy.co/v1
    description: Sandbox environment
  - url: https://api.alloy.co/v1
    description: Production environment
security:
  - basicAuth: []
  - bearerAuth: []
tags:
  - name: Evaluations
    description: Run, retrieve, and audit identity, KYC, KYB, AML, fraud, and credit evaluations.
  - name: Journeys
    description: Multi-step decisioning journeys, applications, batches, and reviews.
  - name: Entities
    description: Person and business entities, notes, merging, feedback, and groups.
  - name: Bank Accounts
    description: Bank account records and related entity history.
  - name: Documents
    description: Uploaded identity, address, and supporting documents for entities.
  - name: Events
    description: Real-time monitoring events for entities, accounts, transactions, and logins.
  - name: Cases
    description: Case management, evidences, and review work items.
  - name: Investigations
    description: Investigation lifecycle, assignment, review, archival, and types.
  - name: Custom Lists
    description: Tenant-defined reference lists with versioning and activation.
  - name: Lists
    description: Built-in watchlist-style lists and list metadata.
  - name: Published Attributes
    description: Custom attributes published from external systems and used in policy.
  - name: Portfolio Evaluations
    description: Bulk re-evaluations across a portfolio of entities.
  - name: Reviews
    description: Manual review notes and decisions on entities.
  - name: Groups
    description: Entity groups and group-level evaluations.
  - name: Batches
    description: Batch processing of journey applications and evaluations.
  - name: OAuth
    description: OAuth 2.0 bearer token issuance and validation.
  - name: Parameters
    description: Tenant-level parameters for evaluations and journeys.
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication with workflow or account-level API key as username and secret as password.
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.0 bearer token obtained via the OAuth endpoints.
  schemas:
    Error:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        details:
          type: object
    EvaluationRequest:
      type: object
      description: Payload submitted to evaluate an entity against an Alloy workflow.
      properties:
        name_first:
          type: string
        name_last:
          type: string
        email_address:
          type: string
        phone_number:
          type: string
        birth_date:
          type: string
          format: date
        document_ssn:
          type: string
        address_line_1:
          type: string
        address_line_2:
          type: string
        address_city:
          type: string
        address_state:
          type: string
        address_postal_code:
          type: string
        address_country_code:
          type: string
        external_entity_id:
          type: string
    Evaluation:
      type: object
      properties:
        evaluation_token:
          type: string
        entity_token:
          type: string
        outcome:
          type: string
          enum: [Approved, Denied, Manual Review]
        summary:
          type: object
        timestamp:
          type: string
          format: date-time
    Entity:
      type: object
      properties:
        entity_token:
          type: string
        external_entity_id:
          type: string
        entity_type:
          type: string
          enum: [person, business]
        name_first:
          type: string
        name_last:
          type: string
        business_name:
          type: string
        created_at:
          type: string
          format: date-time
    JourneyApplication:
      type: object
      properties:
        journey_application_token:
          type: string
        journey_token:
          type: string
        entity_token:
          type: string
        status:
          type: string
        outcome:
          type: string
        current_step:
          type: string
        created_at:
          type: string
          format: date-time
    Event:
      type: object
      properties:
        event_request_token:
          type: string
        event_type:
          type: string
          description: Person Created, Business Created, Bank Account Created, Transaction, Login, Credentials Updated, External Account Created, External Account Updated, Modify Notification, Embedded Authentication, etc.
        entity_token:
          type: string
        payload:
          type: object
        created_at:
          type: string
          format: date-time
    Case:
      type: object
      properties:
        case_token:
          type: string
        status:
          type: string
        entity_token:
          type: string
        created_at:
          type: string
          format: date-time
    Investigation:
      type: object
      properties:
        investigation_token:
          type: string
        status:
          type: string
        investigation_type:
          type: string
        assigned_agent:
          type: string
        created_at:
          type: string
          format: date-time
    Document:
      type: object
      properties:
        document_token:
          type: string
        entity_token:
          type: string
        document_type:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    BankAccount:
      type: object
      properties:
        bank_account_token:
          type: string
        entity_token:
          type: string
        account_number_masked:
          type: string
        routing_number:
          type: string
        account_type:
          type: string
    CustomList:
      type: object
      properties:
        custom_list_token:
          type: string
        name:
          type: string
        version:
          type: integer
        active:
          type: boolean
    List:
      type: object
      properties:
        list_token:
          type: string
        name:
          type: string
        type:
          type: string
    PublishedAttribute:
      type: object
      properties:
        published_attribute_token:
          type: string
        name:
          type: string
        type:
          type: string
    PortfolioEvaluation:
      type: object
      properties:
        portfolio_evaluation_token:
          type: string
        status:
          type: string
    Review:
      type: object
      properties:
        review_token:
          type: string
        decision:
          type: string
        notes:
          type: string
    Note:
      type: object
      properties:
        note_token:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time
    Group:
      type: object
      properties:
        group_token:
          type: string
        members:
          type: array
          items:
            type: string
    Batch:
      type: object
      properties:
        batch_token:
          type: string
        status:
          type: string
        count:
          type: integer
    OAuthToken:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
paths:
  /evaluations:
    post:
      tags: [Evaluations]
      summary: Run an Evaluation
      description: Run an evaluation with a provided payload through Alloy's identity decisioning workflow.
      operationId: postEvaluation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationRequest'
      responses:
        '201':
          description: Evaluation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Evaluation'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /evaluations/{evaluation_token}:
    parameters:
      - name: evaluation_token
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Evaluations]
      summary: Get an Evaluation
      operationId: getEvaluation
      responses:
        '200':
          description: Evaluation retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Evaluation'
    patch:
      tags: [Evaluations]
      summary: Update an Evaluation
      operationId: patchEvaluation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Evaluation updated
  /evaluations/{evaluation_token}/auditaccess:
