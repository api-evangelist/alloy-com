      operationId: patchEvaluationAuditAccess
      responses:
        '200':
          description: Audit access logged
  /parameters:
    get:
      tags: [Parameters]
      summary: Get Workflow Parameters
      operationId: getParameters
      responses:
        '200':
          description: Parameters retrieved
