specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Alloy
providerId: alloy
publisherName: Alloy
serviceCategory: API
created: '2026-05-25'
modified: '2026-05-25'
tags:
  - Identity Decisioning
  - KYC
  - AML
  - Fraud
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Alloy API surface. Alloy combines
  a platform subscription, per-evaluation usage, per-event usage, and pass-through
  data costs into a single bill. This FinOps mapping treats Alloy as a metered
  API service so cost can be allocated to the consuming product line, journey,
  and data source.
principles:
  - name: Visibility
    description: Make Alloy evaluation and event spend visible to engineering,
      risk, compliance, and finance in near real-time.
  - name: Allocation
    description: Tag every evaluation and event with the consuming product,
      journey token, workflow, and tenant so cost can be charged back accurately.
  - name: Optimization
    description: Continuously review which data sources are invoked inside
      workflows, where rules can short-circuit before paid sources are called,
      and whether ongoing monitoring volumes match risk appetite.
  - name: Accountability
    description: Assign budget owners per Alloy product (Identity, Onboarding,
      Ongoing, Fraud, Credit) and per consuming product line.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
costObjects:
  - name: Evaluation
    description: A single evaluation call against an Alloy workflow.
    focusFields:
      - ServiceName: Alloy
      - ChargeCategory: Usage
      - ConsumedUnit: evaluation
      - SkuId: alloy.evaluations
  - name: Ongoing Monitoring Event
    description: A single event submitted to the Events API for perpetual KYC,
      transaction, or login monitoring.
    focusFields:
      - ServiceName: Alloy
      - ChargeCategory: Usage
      - ConsumedUnit: event
      - SkuId: alloy.events
  - name: Third-Party Data Pass-Through
    description: A pass-through call to a third-party data source (identity,
      AML, fraud, document verification) invoked inside an Alloy workflow.
    focusFields:
      - ServiceName: Alloy
      - ChargeCategory: Usage
      - ConsumedUnit: data_call
      - SkuId: alloy.data_pass_through
  - name: Platform Subscription
    description: Recurring platform subscription fee for the contracted Alloy
      Platform products (Identity, Onboarding, Ongoing, Fraud, Credit, Pay).
    focusFields:
      - ServiceName: Alloy
      - ChargeCategory: Purchase
      - ChargeFrequency: Recurring
      - SkuId: alloy.platform
allocationTags:
  - product_line
  - journey_token
  - workflow_name
  - environment
  - tenant
  - data_source
