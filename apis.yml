aid: alloy
name: Alloy
description: >-
  Alloy is a New York-based identity decisioning platform that helps banks, credit unions, and fintechs onboard,
  monitor, and protect customers across KYC, KYB, AML, fraud, credit, and ongoing-monitoring use cases. The Alloy API
  exposes the platform's evaluations, journey applications, entities, events, documents, cases, investigations, lists,
  and webhooks for programmatic identity decisioning and ongoing risk monitoring.
