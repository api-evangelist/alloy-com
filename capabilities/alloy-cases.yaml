specification: Naftiko Capability
specificationVersion: '0.1'
id: alloy-cases
name: Alloy Cases
description: List, retrieve, and manage Alloy Case Management cases including
  evidences and work items used by review teams.
provider: Alloy
providerId: alloy
created: '2026-05-25'
modified: '2026-05-25'
tags:
  - Cases
  - Case Management
  - Review
  - Compliance
operations:
  - id: get-cases
    summary: List Cases
    method: GET
    path: /cases
  - id: get-case
    summary: Get a Case
    method: GET
    path: /cases/{case_token}
  - id: get-case-evidences
    summary: List Case Evidences
    method: GET
    path: /cases/{case_token}/evidences
  - id: post-case-evidence
    summary: Add Case Evidence
    method: POST
    path: /cases/{case_token}/evidences
  - id: get-case-works
    summary: List Case Works
    method: GET
    path: /cases/{case_token}/works
  - id: post-case-work
    summary: Add Case Work
    method: POST
    path: /cases/{case_token}/works
